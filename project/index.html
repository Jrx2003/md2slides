<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md2slides</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Markdown slide generator</p>
      <h1>md2slides</h1>
    </div>
    <nav class="toplinks" aria-label="Project links">
      <a href="https://github.com/Jrx2003/md2slides" target="_blank" rel="noreferrer">GitHub</a>
      <a href="https://revealjs.com/" target="_blank" rel="noreferrer">Reveal.js</a>
      <a href="https://latex-beamer.com/" target="_blank" rel="noreferrer">Beamer</a>
    </nav>
  </header>

  <main class="app-shell">
    <section class="workspace" aria-label="Markdown editor">
      <div class="panel-header">
        <div>
          <h2>Source</h2>
          <p id="sourceStats">0 slides · 0 words</p>
        </div>
        <div class="button-row">
          <button id="useSampleMarkdown" class="button secondary" type="button">Sample</button>
          <button id="clearMarkdown" class="button ghost" type="button">Clear</button>
        </div>
      </div>

      <textarea
        id="markdownInput"
        class="markdown-editor"
        spellcheck="false"
        placeholder="# Quarterly Finance Review&#10;&#10;- Revenue trend&#10;- Margin drivers&#10;- Risk watchlist&#10;&#10;---&#10;&#10;# Next Steps&#10;&#10;- Validate assumptions&#10;- Prepare client discussion">
      </textarea>
    </section>

    <aside class="controls" aria-label="Conversion settings">
      <section class="control-group">
        <h2>Output</h2>
        <div class="segmented" role="radiogroup" aria-label="Output type">
          <button class="segment active" type="button" data-output="reveal">Reveal.js</button>
          <button class="segment" type="button" data-output="beamer">Beamer</button>
        </div>
      </section>

      <section class="control-group" id="revealControls">
        <label for="revealTheme">Reveal theme</label>
        <select id="revealTheme">
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="league">League</option>
          <option value="beige">Beige</option>
          <option value="night">Night</option>
          <option value="serif">Serif</option>
        </select>

        <label for="transition">Transition</label>
        <select id="transition">
          <option value="slide">Slide</option>
          <option value="fade">Fade</option>
          <option value="convex">Convex</option>
          <option value="concave">Concave</option>
          <option value="zoom">Zoom</option>
        </select>
      </section>

      <section class="control-group hidden" id="beamerControls">
        <label for="beamerTheme">Beamer theme</label>
        <select id="beamerTheme">
          <option value="Madrid">Madrid</option>
          <option value="AnnArbor">AnnArbor</option>
          <option value="Antibes">Antibes</option>
          <option value="default">Default</option>
        </select>
      </section>

      <section class="control-group">
        <h2>AI draft</h2>
        <textarea id="notesInput" class="notes-editor" placeholder="Paste raw notes, meeting points, or a rough outline."></textarea>
        <div class="button-grid">
          <button id="useSampleNotes" class="button secondary" type="button">Sample notes</button>
          <button id="generateMarkdown" class="button primary" type="button">Generate</button>
        </div>
        <p id="aiStatus" class="status-line" aria-live="polite"></p>
      </section>
    </aside>

    <section class="preview-panel" aria-label="Preview and export">
      <div class="panel-header">
        <div>
          <h2>Preview</h2>
          <p id="previewMode">Reveal.js HTML</p>
        </div>
        <div class="button-row">
          <button id="copyOutput" class="button secondary" type="button">Copy</button>
          <button id="downloadOutput" class="button secondary" type="button">Download</button>
          <button id="openOutput" class="button primary" type="button">Open</button>
        </div>
      </div>

      <div id="previewFrameWrap" class="preview-frame-wrap">
        <iframe id="previewFrame" title="Slide preview"></iframe>
      </div>
      <pre id="codePreview" class="code-preview hidden"></pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
